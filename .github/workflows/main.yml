name: Update Profile

concurrency:
  group: profile-update
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: read
  repository-projects: read

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-activity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update README recent projects
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RECENT_PROJECTS_USER: ${{ github.repository_owner }}
          RECENT_PROJECTS_COUNT: 10
        run: ./scripts/update_recent_projects.ps1

      - name: Update README with recent activity
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: 'chore: Update README with recent activity'
          MAX_LINES: 10
          FILTER_EVENTS: PushEvent,CreateEvent,ReleaseEvent

      - name: Commit changes
        shell: bash
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update profile assets and README"
          git push
